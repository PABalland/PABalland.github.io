<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComplexityLab — Solutions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0F; color: #F0EDE8; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0A0A0F; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .viz-fade { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function hex2rgb(h){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `${r},${g},${b}`; }

    // ── VIZ COMPONENTS ──────────────────────────────────────────────────────

    function RadarChart({color,data,labels}){
      const cx=130,cy=110,r=80,sides=data.length;
      const angle=i=>((i/sides)*2*Math.PI)-Math.PI/2;
      const pt=(i,val)=>{const a=angle(i);return[cx+r*val*Math.cos(a),cy+r*val*Math.sin(a)]};
      const webPts=n=>Array.from({length:sides},(_,i)=>pt(i,n/5).join(",")).join(" ");
      const dataPts=data.map((v,i)=>pt(i,v/100).join(",")).join(" ");
      return(
        <svg viewBox="0 0 260 230" style={{width:"100%"}}>
          {[1,2,3,4,5].map(n=><polygon key={n} points={webPts(n)} fill="none" stroke={`rgba(${hex2rgb(color)},0.12)`} strokeWidth="1"/>)}
          {Array.from({length:sides},(_,i)=>{const[x,y]=pt(i,1);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={`rgba(${hex2rgb(color)},0.15)`} strokeWidth="1"/>})}
          <polygon points={dataPts} fill={`rgba(${hex2rgb(color)},0.15)`} stroke={color} strokeWidth="2"/>
          {data.map((v,i)=>{const[x,y]=pt(i,v/100);return<circle key={i} cx={x} cy={y} r="4" fill={color}/>})}
          {labels.map((l,i)=>{const[x,y]=pt(i,1.28);return<text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.5)">{l}</text>})}
        </svg>
      );
    }

    function HBarChart({color,bars,highlight}){
      const max=Math.max(...bars.map(b=>b.v));
      return(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {bars.map((b,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:80,fontSize:10,fontFamily:"sans-serif",color:b.label===highlight?"rgba(240,237,232,0.9)":"rgba(240,237,232,0.45)",textAlign:"right",fontWeight:b.label===highlight?600:400}}>{b.label}</div>
              <div style={{flex:1,height:20,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(b.v/max)*100}%`,background:b.label===highlight?color:`rgba(${hex2rgb(color)},0.3)`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}>
                  <span style={{fontSize:9,fontFamily:"sans-serif",color:b.label===highlight?"#0A0A0F":"rgba(240,237,232,0.6)",fontWeight:600}}>{b.v}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function NetworkGraph({color,nodes,edges}){
      return(
        <svg viewBox="0 0 260 220" style={{width:"100%"}}>
          <defs><marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5 z" fill={`rgba(${hex2rgb(color)},0.4)`}/></marker></defs>
          {edges.map((e,i)=>{const a=nodes[e[0]],b=nodes[e[1]];return<line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={`rgba(${hex2rgb(color)},0.2)`} strokeWidth="1" markerEnd="url(#arr)"/>})}
          {nodes.map((n,i)=>(
            <g key={i}>
              <circle cx={n.x} cy={n.y} r={n.r||12} fill={n.center?color:`rgba(${hex2rgb(color)},0.12)`} stroke={color} strokeWidth={n.center?0:1.5}/>
              <text x={n.x} y={n.y+1} textAnchor="middle" dominantBaseline="middle" fontSize="7" fontFamily="sans-serif" fill={n.center?"#0A0A0F":"rgba(240,237,232,0.8)"} fontWeight="600">{n.label}</text>
              {n.sub&&<text x={n.x} y={n.y+(n.r||12)+10} textAnchor="middle" fontSize="7" fontFamily="sans-serif" fill="rgba(240,237,232,0.35)">{n.sub}</text>}
            </g>
          ))}
        </svg>
      );
    }

    function ScatterPlot({color,points,xLabel,yLabel,highlight}){
      return(
        <svg viewBox="0 0 260 210" style={{width:"100%"}}>
          <line x1="30" y1="180" x2="250" y2="180" stroke="rgba(240,237,232,0.08)" strokeWidth="1"/>
          <line x1="30" y1="10" x2="30" y2="180" stroke="rgba(240,237,232,0.08)" strokeWidth="1"/>
          {[0.25,0.5,0.75,1].map(t=>(
            <g key={t}>
              <line x1="30" y1={180-t*160} x2="250" y2={180-t*160} stroke="rgba(240,237,232,0.04)" strokeWidth="1"/>
              <line x1={30+t*220} y1="10" x2={30+t*220} y2="180" stroke="rgba(240,237,232,0.04)" strokeWidth="1"/>
            </g>
          ))}
          <text x="140" y="200" textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.3)">{xLabel}</text>
          <text x="10" y="95" textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.3)" transform="rotate(-90,10,95)">{yLabel}</text>
          {points.map((p,i)=>{
            const cx=30+p.x*220,cy=180-p.y*160,isH=p.label===highlight;
            return(<g key={i}>
              <circle cx={cx} cy={cy} r={isH?7:4} fill={isH?color:`rgba(${hex2rgb(color)},0.3)`} stroke={color} strokeWidth={isH?2:1}/>
              <text x={cx} y={cy-11} textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill={isH?"rgba(240,237,232,0.9)":"rgba(240,237,232,0.45)"}>{p.label}</text>
            </g>);
          })}
        </svg>
      );
    }

    function AreaChart({color,years,series}){
      const max=Math.max(...series[0])*1.1;
      const W=220,H=130,px=40,py=20;
      const x=i=>px+(i/(years.length-1))*W;
      const y=v=>py+H-((v/max)*H);
      const linePts=series[0].map((v,i)=>`${x(i)},${y(v)}`).join(" L ");
      const fillPts=`M${x(0)},${y(series[0][0])} L${linePts} L${x(years.length-1)},${py+H} L${x(0)},${py+H} Z`;
      return(
        <svg viewBox={`0 0 ${W+px*2} ${H+py*2+16}`} style={{width:"100%"}}>
          {[0.25,0.5,0.75,1].map(t=><line key={t} x1={px} y1={py+H-t*H} x2={px+W} y2={py+H-t*H} stroke="rgba(240,237,232,0.05)" strokeWidth="1"/>)}
          <path d={fillPts} fill={`rgba(${hex2rgb(color)},0.12)`}/>
          <path d={`M${linePts}`} fill="none" stroke={color} strokeWidth="2"/>
          {series[0].map((v,i)=><circle key={i} cx={x(i)} cy={y(v)} r="3" fill={color}/>)}
          {years.map((yr,i)=><text key={i} x={x(i)} y={py+H+14} textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.3)">{yr}</text>)}
        </svg>
      );
    }

    function FlowChart({color,flows}){
      return(
        <svg viewBox="0 0 300 220" style={{width:"100%"}}>
          <defs><marker id="arr2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5 z" fill={`rgba(${hex2rgb(color)},0.5)`}/></marker></defs>
          {flows.map((f,i)=>(
            <g key={i}>
              <rect x={f.x} y={f.y} width={f.w} height={f.h} rx="4" fill={`rgba(${hex2rgb(color)},${0.08+i*0.04})`} stroke={`rgba(${hex2rgb(color)},0.4)`} strokeWidth="1"/>
              <text x={f.x+f.w/2} y={f.y+f.h/2} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.8)" fontWeight="500">{f.label}</text>
              {f.ax!=null&&<path d={`M${f.x+f.w},${f.y+f.h/2} L${f.ax},${f.ay}`} stroke={`rgba(${hex2rgb(color)},0.4)`} strokeWidth="1.5" fill="none" markerEnd="url(#arr2)"/>}
            </g>
          ))}
        </svg>
      );
    }

    function HeatGrid({color,rows,cols,data}){
      const max=Math.max(...data.flat());
      return(
        <div style={{display:"grid",gridTemplateColumns:`70px repeat(${cols.length},1fr)`,gap:3}}>
          <div/>
          {cols.map(c=><div key={c} style={{fontSize:8,fontFamily:"sans-serif",color:"rgba(240,237,232,0.35)",textAlign:"center",paddingBottom:3}}>{c}</div>)}
          {rows.map((r,i)=>[
            <div key={r} style={{fontSize:8,fontFamily:"sans-serif",color:"rgba(240,237,232,0.45)",display:"flex",alignItems:"center",paddingRight:4}}>{r}</div>,
            ...data[i].map((v,j)=>(
              <div key={j} style={{height:26,borderRadius:3,background:`rgba(${hex2rgb(color)},${(v/max)*0.8+0.05})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontFamily:"sans-serif",color:v/max>0.55?"rgba(10,10,15,0.9)":"rgba(240,237,232,0.7)",fontWeight:600}}>{v}</div>
            ))
          ])}
        </div>
      );
    }

    function BubbleCloud({color,bubbles}){
      return(
        <svg viewBox="0 0 280 200" style={{width:"100%"}}>
          {bubbles.map((b,i)=>(
            <g key={i}>
              <circle cx={b.x} cy={b.y} r={b.r} fill={`rgba(${hex2rgb(color)},${b.match/100*0.45+0.1})`} stroke={color} strokeWidth={b.match>80?"2":"1"}/>
              <text x={b.x} y={b.y-1} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.9)" fontWeight={b.match>80?"600":"400"}>{b.label}</text>
              <text x={b.x} y={b.y+11} textAnchor="middle" fontSize="7" fontFamily="sans-serif" fill={color}>{b.match}%</text>
            </g>
          ))}
        </svg>
      );
    }

    function SCurve({color,markerPos,stages}){
      const W=220,H=130,px=30,py=15;
      const sig=x=>1/(1+Math.exp(-8*(x-0.5)));
      const pts=Array.from({length:50},(_,i)=>{const x=i/49;return`${px+x*W},${py+H-(sig(x)*H)}`;}).join(" L ");
      const mx=px+markerPos*W,my=py+H-(sig(markerPos)*H);
      return(
        <svg viewBox={`0 0 ${W+px*2} ${H+py*2+20}`} style={{width:"100%"}}>
          <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor={color} stopOpacity="0.05"/><stop offset="100%" stopColor={color} stopOpacity="0.3"/></linearGradient></defs>
          <path d={`M${px},${py+H} L${pts} L${px+W},${py} L${px+W},${py+H} Z`} fill="url(#sg)"/>
          <path d={`M${pts}`} fill="none" stroke={color} strokeWidth="2.5"/>
          <circle cx={mx} cy={my} r="6" fill={color}/>
          <line x1={mx} y1={my} x2={mx} y2={py+H} stroke={`rgba(${hex2rgb(color)},0.3)`} strokeWidth="1" strokeDasharray="3,3"/>
          <text x={mx} y={my-13} textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill={color} fontWeight="700">YOU ARE HERE</text>
          {stages.map((s,i)=><text key={i} x={px+s.x*W} y={py+H+14} textAnchor="middle" fontSize="7" fontFamily="sans-serif" fill="rgba(240,237,232,0.3)">{s.label}</text>)}
        </svg>
      );
    }

    function TreeMap({color,tiles}){
      return(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,width:"100%"}}>
          {tiles.map((t,i)=>(
            <div key={i} style={{background:`rgba(${hex2rgb(color)},${0.08+t.size/100*0.45})`,border:`1px solid rgba(${hex2rgb(color)},0.25)`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 6px",gridColumn:t.wide?"span 2":"span 1",minHeight:54}}>
              <div style={{fontSize:14,fontFamily:"sans-serif",color:color,fontWeight:700}}>{t.value}</div>
              <div style={{fontSize:8,fontFamily:"sans-serif",color:"rgba(240,237,232,0.45)",textAlign:"center",marginTop:3,letterSpacing:"0.04em"}}>{t.label}</div>
            </div>
          ))}
        </div>
      );
    }

    function DotPlot({color,items}){
      const max=Math.max(...items.map(i=>i.v));
      return(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:18,fontSize:9,fontFamily:"sans-serif",color:`rgba(${hex2rgb(color)},0.55)`,textAlign:"right",fontWeight:600}}>#{i+1}</div>
              <div style={{width:100,fontSize:9,fontFamily:"sans-serif",color:"rgba(240,237,232,0.65)"}}>{item.label}</div>
              <div style={{flex:1,height:1,background:`rgba(${hex2rgb(color)},0.15)`,position:"relative"}}>
                <div style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",width:`${(item.v/max)*100}%`,height:1,background:`rgba(${hex2rgb(color)},0.35)`}}/>
                <div style={{position:"absolute",left:`${(item.v/max)*100}%`,top:"50%",transform:"translate(-50%,-50%)",width:7,height:7,borderRadius:"50%",background:color}}/>
              </div>
              <div style={{width:26,fontSize:9,fontFamily:"sans-serif",color:color,fontWeight:700,textAlign:"right"}}>{item.v}</div>
            </div>
          ))}
        </div>
      );
    }

    function MatrixScatter({color,points,quadrants}){
      return(
        <svg viewBox="0 0 260 210" style={{width:"100%"}}>
          <line x1="130" y1="10" x2="130" y2="190" stroke="rgba(240,237,232,0.1)" strokeWidth="1" strokeDasharray="4,3"/>
          <line x1="20" y1="100" x2="250" y2="100" stroke="rgba(240,237,232,0.1)" strokeWidth="1" strokeDasharray="4,3"/>
          {quadrants.map((q,i)=><text key={i} x={q.x} y={q.y} textAnchor="middle" fontSize="8" fontFamily="sans-serif" fill="rgba(240,237,232,0.18)">{q.label}</text>)}
          {points.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r={p.you?7:4} fill={p.you?color:`rgba(${hex2rgb(color)},0.25)`} stroke={color} strokeWidth={p.you?2:1}/>
              <text x={p.x} y={p.y-(p.you?12:9)} textAnchor="middle" fontSize={p.you?9:7} fontFamily="sans-serif" fill={p.you?"rgba(240,237,232,0.95)":"rgba(240,237,232,0.4)"} fontWeight={p.you?700:400}>{p.label}</text>
            </g>
          ))}
        </svg>
      );
    }

    // ── SEGMENT DATA with bullet vizzes ──────────────────────────────────────

    const segments = [
      {
        id: "government", label: "Government", icon: "🏛️", color: "#0057FF",
        headline: "Make smarter investment decisions, backed by science",
        sub: "We help regional agencies, national ministries and EU institutions to turn complex data into tailored industrial policy.",
        cta: "See how it works for Government",
        bullets: [
          {
            text: "Identify which technologies your region is ready to lead in — and which to avoid",
            vizTitle: "Technology Readiness Radar", vizSub: "6 domains scored on complexity × relatedness",
            method: "Economic complexity index · relatedness density · patent data · job postings",
            Viz: ({color}) => <RadarChart color={color} data={[82,67,91,45,73,58]} labels={["Adv Mfg","Green H2","AI","Quantum","Biotech","Robotics"]}/>
          },
          {
            text: "Map which technologies are smart bets vs moonshots vs divestments for your region",
            vizTitle: "Strategic Investment Matrix", vizSub: "X = Feasibility (Relatedness Density) · Y = Economic Impact",
            method: "Complexity economics · relatedness space · patent + trade data",
            Viz: ({color}) => <svg viewBox="0 0 270 215" style={{width:"100%"}}>
              <defs>
                <linearGradient id="qbg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={color} stopOpacity="0.06"/><stop offset="100%" stopColor={color} stopOpacity="0.01"/></linearGradient>
              </defs>
              {/* quadrant backgrounds */}
              <rect x="22" y="10" width="109" height="92" fill={`rgba(${hex2rgb(color)},0.04)`} rx="2"/>
              <rect x="133" y="10" width="129" height="92" fill={`rgba(${hex2rgb(color)},0.09)`} rx="2"/>
              <rect x="22" y="104" width="109" height="100" fill={`rgba(${hex2rgb(color)},0.02)`} rx="2"/>
              <rect x="133" y="104" width="129" height="100" fill={`rgba(${hex2rgb(color)},0.05)`} rx="2"/>
              {/* axes */}
              <line x1="22" y1="102" x2="262" y2="102" stroke="rgba(240,237,232,0.12)" strokeWidth="1" strokeDasharray="3,3"/>
              <line x1="131" y1="10" x2="131" y2="204" stroke="rgba(240,237,232,0.12)" strokeWidth="1" strokeDasharray="3,3"/>
              {/* quadrant labels */}
              <text x="76" y="24" textAnchor="middle" fontSize="7.5" fontFamily="sans-serif" fill="rgba(240,237,232,0.22)" fontStyle="italic">Moonshot</text>
              <text x="197" y="24" textAnchor="middle" fontSize="7.5" fontFamily="sans-serif" fill={`rgba(${hex2rgb(color)},0.55)`} fontWeight="700" fontStyle="italic">Optimal</text>
              <text x="76" y="198" textAnchor="middle" fontSize="7.5" fontFamily="sans-serif" fill="rgba(240,237,232,0.18)" fontStyle="italic">Divest</text>
              <text x="197" y="198" textAnchor="middle" fontSize="7.5" fontFamily="sans-serif" fill="rgba(240,237,232,0.22)" fontStyle="italic">Slow Growth</text>
              {/* axis labels */}
              <text x="142" y="214" textAnchor="middle" fontSize="7" fontFamily="sans-serif" fill="rgba(240,237,232,0.28)">→ Feasibility</text>
              <text x="8" y="102" textAnchor="middle" fontSize="7" fontFamily="sans-serif" fill="rgba(240,237,232,0.28)" transform="rotate(-90,8,102)">↑ Impact</text>
              {/* bubbles: x 22–262, y 10–204, r proportional */}
              {[
                {cx:205,cy:42,r:24,label:"Green H2"},{cx:175,cy:68,r:18,label:"AI Infra"},
                {cx:218,cy:78,r:14,label:"Robotics"},{cx:82,cy:38,r:20,label:"Quantum"},
                {cx:58,cy:65,r:12,label:"Nuclear"},{cx:200,cy:145,r:16,label:"Adv Mfg"},
                {cx:170,cy:168,r:12,label:"Biotech"},{cx:78,cy:148,r:9,label:"Space"},
              ].map((b,i)=>{
                const optimal=b.cx>131&&b.cy<102;
                return <g key={i}>
                  <circle cx={b.cx} cy={b.cy} r={b.r} fill={`rgba(${hex2rgb(color)},${optimal?0.28:0.1})`} stroke={color} strokeWidth={optimal?2:1} strokeOpacity={optimal?0.8:0.35}/>
                  <text x={b.cx} y={b.cy+1} textAnchor="middle" dominantBaseline="middle" fontSize="7.5" fontFamily="sans-serif" fill={optimal?"rgba(240,237,232,0.95)":"rgba(240,237,232,0.5)"} fontWeight={optimal?600:400}>{b.label}</text>
                </g>;
              })}
            </svg>
          },
          {
            text: "See every organization in your ecosystem — their size and relative tech advantage at a glance",
            vizTitle: "Ecosystem Actor Map", vizSub: "Size = org scale · Colour intensity = tech advantage index",
            method: "Relatedness density · patent RTA scores · employment data",
            Viz: ({color}) => <svg viewBox="0 0 270 200" style={{width:"100%"}}>
              {/* Treemap-style blocks, variable size, color intensity = RTA */}
              {[
                {x:4,y:4,w:90,h:52,label:"TU Delft",sub:"Univ · RTA 0.91",rta:0.91},
                {x:98,y:4,w:74,h:52,label:"IMEC",sub:"Lab · RTA 0.84",rta:0.84},
                {x:176,y:4,w:90,h:52,label:"ASML",sub:"Corp · RTA 0.96",rta:0.96},
                {x:4,y:60,w:60,h:42,label:"Philips",sub:"Corp · 0.72",rta:0.72},
                {x:68,y:60,w:78,h:42,label:"VUB",sub:"Univ · 0.65",rta:0.65},
                {x:150,y:60,w:56,h:42,label:"FraunhFr",sub:"Lab · 0.78",rta:0.78},
                {x:210,y:60,w:56,h:42,label:"Siemens",sub:"Corp · 0.68",rta:0.68},
                {x:4,y:106,w:50,h:36,label:"Startup A",sub:"0.55",rta:0.55},
                {x:58,y:106,w:50,h:36,label:"Startup B",sub:"0.48",rta:0.48},
                {x:112,y:106,w:80,h:36,label:"NXP Semi",sub:"Corp · 0.82",rta:0.82},
                {x:196,y:106,w:70,h:36,label:"TNO",sub:"Lab · 0.77",rta:0.77},
                {x:4,y:146,w:262,h:50,label:"Regional Cluster Average — RTA 0.74",sub:"",rta:0.25},
