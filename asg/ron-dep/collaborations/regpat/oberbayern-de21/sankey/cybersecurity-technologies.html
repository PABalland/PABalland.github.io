// ── Dimensions ────────────────────────────────────────────────────────────────
const W = 780, H = 640;
const ML = 148, MR = 155, MT = 0, MB = 20;
const IW = W - ML - MR;
const IH = H - MT - MB;
const BAR = 16, GAP = 5;
const CX = IW / 2;         // center x
const SPINE_W = 10;        // blue center line width

function computeLayout(data) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const usable = IH - GAP * (data.length - 1);
  let y = 0;
  return data.map(d => {
    const h = (d.value / total) * usable;
    const node = { ...d, y, h };
    y += h + GAP;
    return node;
  });
}

const impNodes = computeLayout(importData);
const expNodes = computeLayout(exportData);
const impMap = Object.fromEntries(impNodes.map(d => [d.country, d]));
const expMap = Object.fromEntries(expNodes.map(d => [d.country, d]));

// ── SVG ───────────────────────────────────────────────────────────────────────
const svg = d3.select("#chart").append("svg")
  .attr("viewBox", `0 0 ${W} ${H}`)
  .attr("preserveAspectRatio", "xMidYMid meet");

const g = svg.append("g").attr("transform", `translate(${ML},${MT})`);

// ── Layer 1: Ribbons (behind everything) ──────────────────────────────────────
// Full S-curve from right edge of import bar → left edge of export bar
importData.forEach(({ country }) => {
  const imp = impMap[country];
  const exp = expMap[country];
  if (!imp || !exp) return;

  const x0 = BAR;
  const x1 = IW - BAR;

  const path = [
    `M ${x0} ${imp.y}`,
    `C ${CX} ${imp.y}, ${CX} ${exp.y}, ${x1} ${exp.y}`,
    `L ${x1} ${exp.y + exp.h}`,
    `C ${CX} ${exp.y + exp.h}, ${CX} ${imp.y + imp.h}, ${x0} ${imp.y + imp.h}`,
    `Z`
  ].join(" ");

  g.append("path")
    .attr("class", "link")
    .attr("d", path)
    .attr("fill", imp.color)
    .on("mousemove", e => {
      const tip = document.getElementById("tooltip");
      tip.style.display = "block";
      tip.style.left = (e.clientX + 14) + "px";
      tip.style.top  = (e.clientY - 34) + "px";
      tip.innerHTML = `<strong>${country}</strong><br>Import: ${imp.value}%&emsp;Export: ${exp.value}%`;
    })
    .on("mouseleave", () => { document.getElementById("tooltip").style.display = "none"; });
});

// ── Layer 2: Import bars (on top of ribbons) ──────────────────────────────────
g.selectAll(".imp-bar").data(impNodes).join("rect")
  .attr("x", 0).attr("y", d => d.y)
  .attr("width", BAR).attr("height", d => d.h)
  .attr("fill", d => d.color).attr("rx", 2);

// ── Layer 3: Export bars (on top of ribbons) ──────────────────────────────────
g.selectAll(".exp-bar").data(expNodes).join("rect")
  .attr("x", IW - BAR).attr("y", d => d.y)
  .attr("width", BAR).attr("height", d => d.h)
  .attr("fill", d => d.color).attr("rx", 2);

// ── Layer 4: Center vertical line ─────────────────────────────────────────────
g.append("rect")
  .attr("x", CX - SPINE_W / 2)
  .attr("y", 0)
  .attr("width", SPINE_W)
  .attr("height", IH)
  .attr("fill", "#3b82f6")
  .attr("rx", 3);

// ── Layer 5: Labels & values (topmost) ────────────────────────────────────────
const lbl = sel => sel
  .style("font-family", "'DM Sans', sans-serif")
  .style("font-size", "12px").style("font-weight", "500").style("fill", "#333");
const val = sel => sel
  .style("font-family", "'DM Sans', sans-serif")
  .style("font-weight", "600").style("fill", "#fff");

// Import labels
g.selectAll(".il").data(impNodes).join("text").call(lbl)
  .attr("x", -8).attr("y", d => d.y + d.h / 2)
  .attr("dy", "0.35em").attr("text-anchor", "end")
  .text(d => d.country);

// Import values
g.selectAll(".iv").data(impNodes.filter(d => d.h > 5)).join("text").call(val)
  .attr("x", BAR / 2).attr("y", d => d.y + d.h / 2)
  .attr("dy", "0.35em").attr("text-anchor", "middle")
  .style("font-size", d => d.h < 14 ? "6px" : "8px")
  .text(d => d.value);

// Export labels
g.selectAll(".el").data(expNodes).join("text").call(lbl)
  .attr("x", IW + 8).attr("y", d => d.y + d.h / 2)
  .attr("dy", "0.35em").attr("text-anchor", "start")
  .text(d => d.country);

// Export values
g.selectAll(".ev").data(expNodes.filter(d => d.h > 5)).join("text").call(val)
  .attr("x", IW - BAR / 2).attr("y", d => d.y + d.h / 2)
  .attr("dy", "0.35em").attr("text-anchor", "middle")
  .style("font-size", d => d.h < 14 ? "6px" : "8px")
