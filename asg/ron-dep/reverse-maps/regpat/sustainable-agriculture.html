<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://www.paballand.com/js/d3plus-geomap.v0.6.full.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 16px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      font-family: sans-serif;
      font-size: 13px;
      z-index: 1000;
    }
    #legend h4 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 4px 0;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>

<div id="legend">
  <h4>Dependency category</h4>
  <div class="legend-item"><span class="legend-swatch" style="background: darkgreen"></span>China & US Depend</div>
  <div class="legend-item"><span class="legend-swatch" style="background: darkred"></span>China Depends</div>
  <div class="legend-item"><span class="legend-swatch" style="background: darkblue"></span>US Depends</div>
  <div class="legend-item"><span class="legend-swatch" style="background: darkgrey"></span>Neither Depends</div>
</div>

<script>

  var popData = [
  {
    "id": "US",
    "name": "United States (US)",
    "value": 4,
    "color": "darkgrey"
  },
  {
    "id": "CA",
    "name": "Canada (CA)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "IN",
    "name": "India (IN)",
    "value": 4,
    "color": "darkgrey"
  },
  {
    "id": "AU",
    "name": "Australia (AU)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "NO04",
    "name": "Agder og Rogaland (NO04)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "CN",
    "name": "China (CN)",
    "value": 4,
    "color": "darkgrey"
  },
  {
    "id": "NL33",
    "name": "Zuid-Holland (NL33)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "ITC4",
    "name": "Lombardia (ITC4)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "DE21",
    "name": "Oberbayern (DE21)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "JP",
    "name": "Japan (JP)",
    "value": 2,
    "color": "darkred"
  },
  {
    "id": "CL",
    "name": "Chile (CL)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "FR25",
    "name": "Basse-Normandie (FR25)",
    "value": 1,
    "color": "darkgreen"
  },
  {
    "id": "LI",
    "name": "Liechtenstein (LI)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "VN",
    "name": "Vietnam (VN)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "BR",
    "name": "Brazil (BR)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "ME",
    "name": "Montenegro (ME)",
    "value": 3,
    "color": "darkblue"
  },
  {
    "id": "PK",
    "name": "Pakistan (PK)",
    "value": 3,
    "color": "darkblue"
  }
]  ;

var categoryLabels = {
  1: "China & US Depend",
  2: "China Depends",
  3: "US Depends",
  4: "Neither Depends"
};

var categoryColors = {
  1: "darkgreen",
  2: "darkred",
  3: "darkblue",
  4: "darkgrey"
};

var chart = new d3plus.Geomap()
  .config({
    data: popData,
    ocean: "transparent",
    projection: "geoTransverseMercator",
    legend: false,
    shapeConfig: {
      Path: {
        fill: function(d) {
          return categoryColors[d.value] || "white";
        }
      }
    },
    label: function(d) {
      return d.name + ": " + categoryLabels[d.value];
    }
  });

chart
  .topojson("https://www.paballand.com/json/topojson/NUTS_RG_20M_2010_4326-nuts-2-regpat.json")
  .fitFilter(function(d) {
    return ["FRY1","FRY2","FRY3","FRY4","FRY5","ES70","FRY","ES7","FRY10","FRY20","FRY30","FRY40","FRY50","ES70"].indexOf(d.id) < 0;
  })
  .render();

</script>
</html>
