<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
.knitr .inline{background:#f7f7f7;border:1px solid #B0B0B0;}
.error{font-weight:bold;color:#FF0000;}
.warning{font-weight:bold;}
.message{font-style:italic;}
.source,.output,.warning,.error,.message{padding:0 1em;border:1px solid #F7F7F7;}
.source{background:#f5f5f5;}
.hl.num{color:#AF0F91;}
.hl.str{color:#317ECC;}
.hl.com{color:#AD95AF;font-style:italic;}
.hl.opt{color:#000;}
.hl.std{color:#585858;}
.hl.kwa{color:#295F94;font-weight:bold;}
.hl.kwb{color:#B05A65;}
.hl.kwc{color:#55aa55;}
.hl.kwd{color:#BC5A65;font-weight:bold;}
body{margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;}
.container{display:flex;flex-direction:column;height:100vh;}
#chart{flex:1 1 auto;}
.legend{display:flex;justify-content:center;padding:12px 0;}
.legend-item{display:flex;align-items:center;margin:0 24px;font-size:28px;}
.box{width:28px;height:28px;margin-right:10px;border:none;}
.pos{background:#2d7c2d;}
.neg{background:#8B1A0F;}
</style>
<script src="https://cdn.jsdelivr.net/npm/d3plus-hierarchy@1"></script>
</head>
<body>
<div class="container">
  <div id="chart"></div>
  <div class="legend">
    <div class="legend-item"><span class="box pos"></span><span>Link RCA &gt; 1</span></div>
    <div class="legend-item"><span class="box neg"></span><span>Link RCA &lt; 1</span></div>
  </div>
</div>

<script>
var data= [
  {
    "to": "Italy (IT)",
    "from": "Ukraine (UA)",
    "domain": "Wood Processing",
    "full": 1,
    "binary": 1,
    "expected": 4.83,
    "untapped": 3.83,
    "links.rca": 0.21,
    "sum_from": 0.5,
    "sum_to": 15,
    "binary.pc": 0.0059,
    "th.max": 243.5,
    "th.max.pc": 0.0287,
    "RD": 48.34,
    "RD.added": 36.74,
    "pct_from": 0.0397,
    "pct_to": 1.1905,
    "pct_binary_from": 0.84,
    "parent": "Europe",
    "n": 2.44,
    "pct": 100,
    "nn": 40.9836,
    "color": "#006400",
    "id": "Italy (IT)",
    "value": 1
  }
] ; new d3plus.Treemap().select("#chart").data(data).groupBy(["parent","id"]).tooltipConfig({body:function(d){return"<table><tr><td>Links:</td><td>"+d.binary+"</td></tr><tr><td>PCT:</td><td>"+d.pct+"</td></tr></table>";},title:function(d){var t=d.id;return t.charAt(0).toUpperCase()+t.substr(1).toUpperCase();}}).sum("value").layoutPadding(1.25).legend(false).color("color").render();
</script>
</body>
</html>
